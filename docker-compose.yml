services:
  postgres:
    image: postgres:16-alpine
    container_name: packd-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: packd
      POSTGRES_PASSWORD: packd_dev
      POSTGRES_DB: packd
    volumes:
      - packd-postgres-data:/var/lib/postgresql/data

volumes:
  packd-postgres-data: